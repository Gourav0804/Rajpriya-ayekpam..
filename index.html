<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Quiz 💖</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #ffd6e0, #e0c3fc);
  overflow: hidden;
  color: #fff;
  text-align: center;
}

/* Loader */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ffb6c1;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  font-size: 24px;
}

/* Container */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
}

/* Question */
.question {
  font-size: 22px;
  margin-bottom: 30px;
  animation: fadeIn 1s ease;
}

/* Buttons */
.btn {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  position: relative;
}

.btn:hover {
  background: rgba(255,255,255,0.4);
  transform: scale(1.1);
}

/* Floating hearts */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Final Message */
.final {
  font-size: 20px;
  line-height: 1.6;
  white-space: pre-line;
  animation: fadeIn 2s ease;
}

.glow {
  font-size: 24px;
  color: #fff;
  text-shadow: 0 0 10px #fff, 0 0 20px #ff69b4, 0 0 40px #ff1493;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: red;
  top: -10px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>

<body>

<div id="loader">Loading Love... 💖</div>

<div class="container" id="app"></div>

<audio id="bgMusic" loop autoplay>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7c3a9c1e36.mp3" type="audio/mp3">
</audio>

<script>
const app = document.getElementById("app");

const questions = [
  {q:"Are you happy with your life?", yes:true, no:true},
  {q:"Do you want to be the happiest girl?", yes:true, no:"escape"},
  {q:"You are the best nurse anyone has ever seen?", yes:true},
  {q:"Is there anyone more Courageous than Miss. Rajpriya Ayekpam?", No:true, Yes:"escape"},
  {q:"If you had a superpower for a day, will you make everything better?", yes:true, no:"escape"},
  {q:"Would you say you're more cute than serious?", yes:true, no:"escape"},
  {q:"Do you like cheesy pickup lines?", yes:true, no:"escape"},
  {q:"I don’t know if this is the right time but Would you give me a chance to make you happiest girl in the world?", yes💖:"true", no💖:"escape"},
  {q:"Do you believe in Love at first sight or should I walk again in same green scrubs in Liver ICU Saying "Namaste Biomedical.....!!!?", yes:"final", no:"escape"}
];

let index = 0;

/* Render Question */
function renderQuestion() {
  const current = questions[index];

  app.innerHTML = `
    <div class="question">${current.q}</div>
    <div>
      <button class="btn" onclick="next()">Yes ❤️</button>
      <button class="btn" id="noBtn">No ❤️</button>
    </div>
  `;

  const noBtn = document.getElementById("noBtn");

  if(current.no === "escape"){
    noBtn.addEventListener("mouseover", moveButton);
  } else {
    noBtn.onclick = next;
  }
}

/* Next */
function next(){
  index++;
  if(index >= questions.length){
    showFinal();
  } else {
    renderQuestion();
  }
}

/* Escape Button */
function moveButton(e){
  const btn = e.target;
  const x = Math.random() * window.innerWidth - 100;
  const y = Math.random() * window.innerHeight - 50;

  btn.style.position = "absolute";
  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

/* Final Screen */
function showFinal(){
  app.innerHTML = `
  <div class="final glow" id="typeText"></div>
  `;
  typeWriter();
  startConfetti();
}

/* Typewriter */
const message = `Hey Pretty girl ❤️

Happy Birthday 🎂 ❤️

You are the most courageous and pretty girl.
I have been lucky to have you in my life...

I Love you Jaana...❤️!!
I always will...❤️!!!

If I could ask God one thing,
I would ask for your mother's recovery ❤️

Let's be happy today...
Let's bring joy back into your life 💖`;

let i = 0;
function typeWriter(){
  if(i < message.length){
    document.getElementById("typeText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

/* Confetti */
function startConfetti(){
  for(let i=0;i<50;i++){
    let conf = document.createElement("div");
    conf.className = "confetti";
    conf.style.left = Math.random()*100+"vw";
    conf.style.background = ["#ff0","#f0f","#0ff","#fff"][Math.floor(Math.random()*4)];
    conf.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(conf);
  }
}

/* Floating Hearts */
setInterval(()=>{
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100+"vw";
  document.body.appendChild(heart);

  setTimeout(()=> heart.remove(), 6000);
},500);

/* Loader */
setTimeout(()=>{
  document.getElementById("loader").style.display="none";
  renderQuestion();
},2000);
</script>

</body>
</html>
